version: '3.8'

services:
  backend:
    build: ./backend
    container_name: ga-cowork-backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - WORKSPACE_PATH=/workspace
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./workspace:/workspace # Shared workspace for AI file operations
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: ga-cowork-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  workspace:
